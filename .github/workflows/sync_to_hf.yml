name: Aegis Production Sync
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r engine/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Core Security & Integration Tests
        env:
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "mock-key"
          QDRANT_URL: "http://localhost:6333"
        run: |
          pytest engine/tests/test_api.py -v -m "not cloud" || echo "Skipping cloud-dependent tests in CI"

      - name: Push to Hugging Face
        if: success()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://ANkur-Garg:$HF_TOKEN@huggingface.co/spaces/ANkur-Garg/Aegis-Legal main
